<!DOCTYPE html>

<html>

	<head>
	
		<title>To-Do List Application</title>
		<link rel="stylesheet" href="style.css" type="text/css" />
		<style>
			header {
				text-align: center;
			}
			
			section {
				width: 50%;
				min-width: 800px;
				margin-top: 25px;
				margin-bottom: 25px;
				margin-left: auto;
				margin-right: auto;
				border: 4px solid;
				padding: 10px;
			}
			
			button.option {
				margin-bottom: 20px;
			}
			
			#list ul {
				list-style: none;
				margin-left: -20px;
			}
			
			#list input {
				margin: 5px;
				margin-right: 10px;
			}
			
			.project li {
				margin-left: 25px;
			}
			
			.high {
				color: red;
			}
			
			.medium {
				color: orange;
			}
			
			.low {
				color: gray;
			}
			
			.options {
				text-align: center;
			}
		</style>
		
	</head>
	
	<body>
		
		<script src="todo.js" type="text/javascript"></script>
		
		<script type="text/javascript">
		
			toDoList = new TaskList();
			
			window.onload = toDoList.restoreAll;
			
			window.onunload = toDoList.saveAll;
		
		</script>
		
		<header>
			<h1>To-Do List</h1>
		</header>
		
		<section id="list">
			<ul>
			</ul>
		</section>
		
		<section class="options" id="task">
			<h1>Add a New Task</h1>
			Task: <input id="newtask" type="text"><br><br>
			Project: <input id="project" type="text" value="Miscellaneous"><br><br>
			Due: <input id="duedate" type="date"><br><br>
			Priority: 
			<select id="priority">
				<option value="high">High</option>
				<option value="medium">Medium</option>
				<option value="low">Low</option>
			</select><br><br>
			<button class="option" onclick="toDoList.addTask(document.getElementById('newtask').value, document.getElementById('duedate').value, document.getElementById('priority').value, document.getElementById('project').value);">Add Task</button>
		</section>
		
		<section class="options" id="extras">
			<h1>Additional Options</h1>
			<button class="option" onclick="toDoList.removeCheckedTasks();">Remove Completed Tasks</button>
			<button class="option" onclick="toDoList.saveAll();">Save Incomplete Tasks</button>
			<button class="option" onclick="toDoList.restoreAll();">Restore Saved Tasks</button>
			<p>All incomplete tasks will be saved upon navigating away from the page.</p>
		</section>
		
		<footer>
			<p>&copy; Copyright 2014, Joshua Jackson.</p>
		</footer>
			
	</body>

</html>
