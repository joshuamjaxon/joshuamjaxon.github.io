<!DOCTYPE html>

<html>

	<head>
	
		<title>To-Do List Application</title>
		<link rel="stylesheet" href="style.css" type="text/css" />
		<style>
			header {
				text-align: center;
			}
			
			section {
				width: 50%;
				min-width: 800px;
				margin-top: 25px;
				margin-bottom: 25px;
				margin-left: auto;
				margin-right: auto;
				border: 4px solid;
				padding: 10px;
			}
			
			#list ul {
				list-style: none;
				margin-left: -20px;
			}
			
			#list input {
				margin: 5px;
				margin-right: 10px;
			}
			
			#options {
				text-align: center;
			}
		</style>
		
	</head>
	
	<body>
		
		<script type="text/javascript">
		
			function addTask()
			{
				// Reserve local variables
				var newTask, checkBox, list;
				
				// Create new checkbox
				checkBox = document.createElement('input');
				checkBox.type = "checkbox";
				checkBox.setAttribute('onclick', 'crossOut(this);');
				
				// Create new list element
				newTask = document.createElement('li');
				newTask.appendChild(checkBox);
				newTask.innerHTML += document.getElementById('newtask').value;
				
				// Append new item to list
				document.querySelector('#list ul').appendChild(newTask);
				
				// Clear input box
				document.getElementById('newtask').value = "";
			}
			
			function crossOut(item)
			{
				if (item.checked)
				{
					item.parentNode.style.textDecoration = "line-through";
				}
				else
				{
					item.parentNode.style.textDecoration = "none";
				}
			}
			
		</script>	
		
		<header>
			<h1>To-Do List</h1>
		</header>
		
		<section id="list">
			<ul>
			</ul>
		</section>
		
		<section id="options">
			<input id="newtask" type="text"><br>
			<button onclick="addTask();">Add Task</button>
		</section>
		
		<footer>
			<p>&copy; Copyright 2014, Joshua Jackson.</p>
		</footer>
			
	</body>

</html>
